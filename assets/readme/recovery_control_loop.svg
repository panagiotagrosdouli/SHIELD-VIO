<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500"><rect width="1200" height="500" rx="28" fill="#07111f"/><text x="54" y="58" fill="#f8fafc" font-family="Inter,Arial" font-size="30" font-weight="700">Recovery-aware closed-loop protection</text><text x="54" y="90" fill="#94a3b8" font-family="Inter,Arial" font-size="16">The shield changes downstream behavior and requests recovery instead of only logging estimator failure.</text><g font-family="Inter,Arial" text-anchor="middle"><g transform="translate(70 170)"><rect width="190" height="110" rx="22" fill="#10233a" stroke="#38bdf8" stroke-width="2"/><text x="95" y="48" fill="#7dd3fc" font-size="19" font-weight="700">ESTIMATOR</text><text x="95" y="75" fill="#cbd5e1" font-size="14">state + covariance</text></g><g transform="translate(330 170)"><rect width="190" height="110" rx="22" fill="#21183c" stroke="#a78bfa" stroke-width="2"/><text x="95" y="48" fill="#c4b5fd" font-size="19" font-weight="700">INTROSPECTION</text><text x="95" y="75" fill="#cbd5e1" font-size="14">NIS · quality · shift</text></g><g transform="translate(590 170)"><rect width="190" height="110" rx="22" fill="#3a2511" stroke="#f59e0b" stroke-width="2"/><text x="95" y="48" fill="#fcd34d" font-size="19" font-weight="700">SHIELD</text><text x="95" y="75" fill="#cbd5e1" font-size="14">hysteresis + policy</text></g><g transform="translate(850 170)"><rect width="280" height="110" rx="22" fill="#351521" stroke="#fb7185" stroke-width="2"/><text x="140" y="42" fill="#fda4af" font-size="19" font-weight="700">NAVIGATION ACTION</text><text x="140" y="70" fill="#cbd5e1" font-size="14">slow · hold · halt</text><text x="140" y="90" fill="#cbd5e1" font-size="14">request relocalization</text></g></g><g stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#a)"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs><path d="M260 225H325"/><path d="M520 225H585"/><path d="M780 225H845"/><path d="M990 280V380H165V285"/></g><rect x="385" y="352" width="430" height="75" rx="20" fill="#0e2b24" stroke="#34d399" stroke-width="2"/><text x="600" y="383" fill="#6ee7b7" font-family="Inter,Arial" font-size="19" text-anchor="middle" font-weight="700">RECOVERY / REINITIALIZATION</text><text x="600" y="407" fill="#cbd5e1" font-family="Inter,Arial" font-size="14" text-anchor="middle">external pose reset · tracking restart · safe resume</text></svg>